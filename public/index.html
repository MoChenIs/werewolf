<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>协作平台</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="global-toast" class="toast-error hidden"></div>
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-card">
      <p class="modal-text">确认退出会议室？</p>
      <div class="modal-actions">
        <button class="btn btn-primary btn-sm modal-confirm" onclick="confirmExit()">确认</button>
        <button class="btn btn-secondary btn-sm" onclick="closeModal()">取消</button>
      </div>
    </div>
  </div>

  <!-- 大厅 -->
  <div id="lobby-page" class="page">
    <div class="lobby-container">
      <h1 class="app-title">协作工作台</h1>
      <p class="app-subtitle">沟通 · 决策 · 反馈</p>
      <div class="lobby-actions">
        <div class="input-group">
          <input type="text" id="player-name" placeholder="输入姓名" maxlength="8">
        </div>
        <div class="input-group">
          <input type="text" id="room-id-input" placeholder="项目编号" maxlength="6">
          <button id="join-room-btn" class="btn btn-secondary">加入项目</button>
        </div>
        <div class="divider"><span>或</span></div>
        <button id="create-room-btn" class="btn btn-primary">创建项目</button>
      </div>
      <div id="lobby-error" class="error-msg hidden"></div>
    </div>
  </div>

  <!-- 房间 -->
  <div id="room-page" class="page hidden">
    <div class="room-header">
      <span>项目: <strong id="room-id-display"></strong></span>
      <span id="player-count-display">1/12</span>
      <button id="add-ai-btn" class="btn btn-secondary btn-sm hidden">+成员</button>
      <button id="test-mode-btn" class="btn btn-sm hidden" style="color:var(--text-secondary);border:1px solid var(--border);background:var(--card);">测试模式</button>
      <button id="start-game-btn" class="btn btn-primary btn-sm hidden">开始会议</button>
      <button id="leave-room-btn" class="btn btn-sm leave-btn">离开</button>
    </div>
    <div id="player-list" class="player-list"></div>
  </div>

  <!-- 游戏页面（左50% + 右50%留空） -->
  <div id="game-page" class="page hidden">
    <div class="game-page-layout">
      <div class="game-left">
        <!-- 顶部栏：阶段 + 计时器 -->
        <div class="zone-status">
          <div class="phase-display">
            <span id="phase-text">等待开始</span>
            <span class="timer-display">(<span id="timer-text">--</span>s)</span>
          </div>
          <button class="phase-exit-btn" onclick="exitGame()">离开</button>
          <button class="btn btn-sm boss-btn" onclick="toggleBossMode()" title="Alt+L">跑路了兄弟们</button>
        </div>
        <!-- 跑路模式文档（隐藏，取代游戏内容） -->
        <div id="boss-doc" class="boss-doc hidden">
          <iframe src="boss-doc.html" style="width:100%;height:100%;border:none;"></iframe>
        </div>
        <!-- 参与者标签 -->
        <div class="player-status-list" id="player-status-list"></div>
        <!-- 消息区 -->
        <div class="zone-feed">
          <div class="feed-header">讨论记录</div>
          <div class="feed-messages" id="feed-messages"></div>
        </div>
        <!-- 操作区 -->
        <div class="zone-action">
          <div class="action-panel" id="action-panel">
            <p class="waiting-text">等待其他成员...</p>
          </div>
        </div>
      </div>
      <div class="game-right">
        <iframe src="right-panel.html" style="width:100%;height:100%;border:none;"></iframe>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="timer.js"></script>
  <script src="app.js"></script>
</body>
</html>
