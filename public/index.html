<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>协作平台</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="global-toast" class="toast-error hidden"></div>

  <div class="app-layout">
    <!-- 左侧：游戏内容 -->
    <div class="left-panel">
      <div id="lobby-page" class="page">
        <div class="lobby-container">
          <h1 class="app-title">协作工作台</h1>
          <p class="app-subtitle">沟通 · 决策 · 反馈</p>
          <div class="lobby-actions">
            <div class="input-group">
              <input type="text" id="player-name" placeholder="输入昵称" maxlength="8">
            </div>
            <div class="input-group">
              <input type="text" id="room-id-input" placeholder="房间号" maxlength="6">
              <button id="join-room-btn" class="btn btn-secondary">加入</button>
            </div>
            <div class="divider"><span>或</span></div>
            <button id="create-room-btn" class="btn btn-primary">创建</button>
          </div>
          <div id="lobby-error" class="error-msg hidden"></div>
        </div>
      </div>

      <div id="room-page" class="page hidden">
        <div class="room-header">
          <span>房间: <strong id="room-id-display"></strong></span>
          <span id="player-count-display">1/12</span>
          <button id="add-ai-btn" class="btn btn-secondary btn-sm hidden">+AI</button>
          <button id="start-game-btn" class="btn btn-primary btn-sm hidden">开始</button>
          <button id="leave-room-btn" class="btn btn-sm leave-btn">离开</button>
        </div>
        <div id="player-list" class="player-list"></div>
      </div>

      <div id="game-page" class="page hidden">
        <div class="game-layout">
          <div class="zone-status">
            <div class="phase-display">
              <span id="phase-text">等待开始</span>
            </div>
            <div class="timer-display">
              <span id="timer-text">--</span>
            </div>
            <div class="player-status-list" id="player-status-list"></div>
          </div>

          <div class="zone-feed">
            <div class="feed-header">消息记录</div>
            <div class="feed-messages" id="feed-messages"></div>
          </div>

          <div class="zone-action">
            <div class="action-panel" id="action-panel">
              <p class="waiting-text">等待其他成员...</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 右侧：留空 -->
    <div class="right-panel"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="timer.js"></script>
  <script src="app.js"></script>
</body>
</html>
